# Acceptance eval gate — runs the deterministic behavioral evals in evals/ on every
# PR + push. These assert product-level safety invariants (e.g. output secret
# scrubbing) rather than implementation details. Grow this suite as the product does.
name: Eval gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance-evals:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Set up Python 3.11
        run: uv python install 3.11
      - name: Install (editable, all+dev extras) + run acceptance evals
        # pytest lives in the `dev` optional-extra (pyproject [project.optional-dependencies]),
        # so the eval gate must install `.[all,dev]` — mirrors tests.yml. A bare
        # `uv sync` omits dev and yields "No module named pytest".
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"
          python -m pytest -p no:cacheprovider -q evals/
