# CD — build the Hermes image, scan + attest it, push to Artifact Registry by
# immutable SHA, then deploy staging -> production (environment-gated).
#
# Auth: Workload Identity Federation (no long-lived SA keys). Configure once:
#   gcloud iam workload-identity-pools / providers, grant the deploy SA
#   roles/artifactregistry.writer + roles/compute.instanceAdmin.v1 +
#   roles/iam.serviceAccountTokenCreator, and bind the WIF principal to it.
# Then set these repo VARIABLES (Settings > Secrets and variables > Actions > Variables):
#   GCP_PROJECT, GCP_ZONE, AR_REPO (e.g. us-central1-docker.pkg.dev/<proj>/autonomousagent-images),
#   STAGING_VM, PROD_VM, GCP_WIF_PROVIDER (projects/<n>/locations/global/workloadIdentityPools/<p>/providers/<pr>),
#   GCP_DEPLOY_SA (deploy-sa@<proj>.iam.gserviceaccount.com).
# No secrets needed for auth (WIF). See docs/CICD-TIER1.md.
name: CD — build & deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_production:
        description: "Also deploy to production after staging"
        type: boolean
        default: false

permissions: {}

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight deploy

env:
  IMAGE: ${{ vars.AR_REPO }}/hermes

jobs:
  build:
    name: Build, scan, attest, push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # WIF
      packages: write
      attestations: write # build provenance attestation
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: meta
        name: Compute immutable tag
        run: echo "tag=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@8254fb75a33b976a221574d287e93919e6a36f70 # v2.1.6
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a # v2.1.2
      - run: gcloud auth configure-docker "$(echo "${{ vars.AR_REPO }}" | cut -d/ -f1)" --quiet

      - uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      - id: push
        name: Build & push (amd64, SHA-tagged — never :latest)
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          build-args: HERMES_GIT_SHA=${{ github.sha }}
          provenance: true
          sbom: true

      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # 0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.30.5
        with:
          sarif_file: trivy.sarif

      - name: Attest build provenance
        uses: actions/attest-build-provenance@1c608d11d69870c2092266b3f9a6f3abbf17002c # v1.4.3
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  deploy-staging:
    name: Deploy → staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging # gate + secrets/vars scoped to staging
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@8254fb75a33b976a221574d287e93919e6a36f70 # v2.1.6
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a # v2.1.2
      - name: Roll staging to the new SHA tag (compose pins IMAGE_TAG, refuses :latest)
        run: |
          gcloud compute ssh "${{ vars.STAGING_VM }}" --zone "${{ vars.GCP_ZONE }}" \
            --project "${{ vars.GCP_PROJECT }}" --tunnel-through-iap --command "
              set -e
              echo 'IMAGE_TAG=${{ needs.build.outputs.tag }}' | sudo tee /etc/hermes/image-tag.env
              sudo systemctl restart docker-compose-hermes.service
            "
      - name: Smoke-check staging health
        run: |
          for i in $(seq 1 30); do
            if gcloud compute ssh "${{ vars.STAGING_VM }}" --zone "${{ vars.GCP_ZONE }}" \
                 --project "${{ vars.GCP_PROJECT }}" --tunnel-through-iap \
                 --command "docker ps --filter name=hermes --filter health=healthy -q | grep -q ." ; then
              echo "staging healthy"; exit 0; fi
            sleep 10
          done
          echo "staging did not become healthy"; exit 1

  deploy-production:
    name: Deploy → production
    needs: [build, deploy-staging]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production
    runs-on: ubuntu-latest
    environment: production # REQUIRED REVIEWERS gate (set in repo settings)
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@8254fb75a33b976a221574d287e93919e6a36f70 # v2.1.6
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a # v2.1.2
      - name: Roll production to the verified SHA tag
        run: |
          gcloud compute ssh "${{ vars.PROD_VM }}" --zone "${{ vars.GCP_ZONE }}" \
            --project "${{ vars.GCP_PROJECT }}" --tunnel-through-iap --command "
              set -e
              echo 'IMAGE_TAG=${{ needs.build.outputs.tag }}' | sudo tee /etc/hermes/image-tag.env
              sudo systemctl restart docker-compose-hermes.service
            "
