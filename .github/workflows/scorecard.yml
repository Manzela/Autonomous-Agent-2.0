# OpenSSF Scorecard — continuously grades the repo's supply-chain posture
# (branch protection, pinned deps, token permissions, code review, CI tests,
# dangerous workflow patterns) and uploads results to the Security tab.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "18 4 * * 2" # weekly
  push:
    branches: [main]

permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF
      id-token: write # publish results to the public OpenSSF API (optional)
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false # set true only for public repos
      - name: Upload SARIF to code scanning
        # Best-effort: requires code scanning (GHAS) enabled; tolerate on a
        # private repo without it so the workflow stays green.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@3599b3baa15b485a2e49ef411a7a4bb2452e7f93 # v3.30.5
        with:
          sarif_file: results.sarif
