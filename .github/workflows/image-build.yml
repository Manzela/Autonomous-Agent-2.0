# Standalone image build + scan gate (no registry push, no deploy — this repo is
# self-contained). Verifies the Dockerfile builds, scans the image for HIGH/CRITICAL
# vulns, and produces an SBOM artifact. Add a registry/push + deploy step later when
# a target exists.
name: Image build & scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths: [Dockerfile, ".dockerignore", "docker/**", "pyproject.toml", "uv.lock"]
  workflow_dispatch:

permissions: {}

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload Trivy SARIF
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Free up runner disk space
        # The multi-stage Hermes image (Python + Node + browser + ML deps) plus
        # Trivy's docker-export of every layer to /tmp overruns the ~14 GB free on
        # a default ubuntu-latest runner ("no space left on device"). Reclaim the
        # preinstalled toolchains we don't use (~20 GB+) before building. Plain rm
        # (no third-party action) keeps the supply chain pinned.
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo docker image prune -af || true
          df -h /

      - name: Build image (load locally, do not push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          push: false
          tags: hermes-agent:ci-${{ github.sha }}
          build-args: HERMES_GIT_SHA=${{ github.sha }}

      - name: Trivy scan (report HIGH/CRITICAL; non-blocking until baselined)
        # Honour the "non-blocking" intent: a Trivy infrastructure hiccup (DB
        # download, disk, rate-limit) must not red the gate. The SARIF still
        # uploads to the Security tab when the scan does complete.
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: hermes-agent:ci-${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        # Best-effort: requires code scanning (GHAS) enabled; tolerate otherwise.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@3599b3baa15b485a2e49ef411a7a4bb2452e7f93 # v3.30.5
        with:
          sarif_file: trivy.sarif

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: hermes-agent:ci-${{ github.sha }}
          format: spdx-json
          artifact-name: sbom-${{ github.sha }}.spdx.json
