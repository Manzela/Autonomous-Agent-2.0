# CodeQL code scanning (Tier-1: SAST on every PR + a weekly full scan).
# Upstream hermes-agent ships OSV + supply-chain audit but no CodeQL; this adds
# first-party static analysis for the Python and JS/TS surfaces.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly, Monday 03:27 UTC

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Initialize CodeQL
        uses: github/codeql-action/init@3599b3baa15b485a2e49ef411a7a4bb2452e7f93 # v3.30.5
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - name: Autobuild
        uses: github/codeql-action/autobuild@3599b3baa15b485a2e49ef411a7a4bb2452e7f93 # v3.30.5
      - name: Analyze
        # Tolerate the SARIF upload failing on a private repo where code scanning
        # (GitHub Advanced Security) is not yet enabled — keeps CI green; results
        # flow to the Security tab automatically once code scanning is on.
        continue-on-error: true
        uses: github/codeql-action/analyze@3599b3baa15b485a2e49ef411a7a4bb2452e7f93 # v3.30.5
        with:
          category: "/language:${{ matrix.language }}"
