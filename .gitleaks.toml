# gitleaks config for Autonomous-Agent-2.0 (standalone Hermes Agent).
# Extends the default ruleset and allowlists the categories verified (2026-06) to
# be FALSE POSITIVES — 0 real secrets exist in source:
#   * public OAuth client IDs (device/PKCE flows; public by design)
#   * Google installed-app "client secret" pieces (documented non-confidential)
#   * the private-key REGEX used by agent/redact.py to scrub keys
#   * test fixtures and documentation examples
# Allowlisting is targeted (line/path regex), not whole-repo, so a NEW real secret
# is still caught.
title = "Autonomous-Agent-2.0 gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Verified false positives (public OAuth IDs, redaction patterns, fixtures, docs)."
paths = [
  '''(^|/)tests?/''',
  '''\.md$''',
  '''\.example$''',
  '''(^|/)docs/''',
  '''(^|/)locales/''',
  '''(^|/)website/''',
]
regexTarget = "line"
regexes = [
  '''OAUTH_CLIENT_ID\s*=''',
  '''_PUBLIC_CLIENT_ID_''',
  '''_PUBLIC_CLIENT_SECRET_SUFFIX''',
  '''_DEFAULT_CLIENT_ID''',
  '''PRIVATE KEY-----''',
  '''VAPI_DEFAULT_VOICE_ID''',
]
