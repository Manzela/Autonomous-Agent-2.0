# gitleaks config for Autonomous-Agent-2.0 (standalone Hermes Agent).
# Extends the default ruleset. Allowlists are PATH-SCOPED to the specific files
# and directories verified (2026-06) to contain only false positives — NOT global
# value/line regexes, so a real secret in any other file is still caught.
#   * tests/, evals/, docs/, *.md, *.example, locales/, website/ — fixtures + docs
#   * agent/redact.py — the private-key/secret REGEX PATTERNS used to scrub output
#   * agent/google_oauth.py, agent/anthropic_adapter.py, hermes_cli/auth.py,
#     hermes_cli/copilot_auth.py — PUBLIC OAuth client IDs / documented non-confidential
#   * optional-skills/.../telephony.py — a public default voice ID
title = "Autonomous-Agent-2.0 gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Path-scoped false positives (verified). NOT global — real secrets elsewhere are still caught."
paths = [
  '''(^|/)tests?/''',
  '''(^|/)evals?/''',
  '''(^|/)docs/''',
  '''\.md$''',
  '''\.example$''',
  '''(^|/)locales/''',
  '''(^|/)website/''',
  '''(^|/)agent/redact\.py$''',
  '''(^|/)agent/google_oauth\.py$''',
  '''(^|/)agent/anthropic_adapter\.py$''',
  '''(^|/)hermes_cli/auth\.py$''',
  '''(^|/)hermes_cli/copilot_auth\.py$''',
  '''(^|/)optional-skills/productivity/telephony/scripts/telephony\.py$''',
]
